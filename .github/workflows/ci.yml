name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Dockerfile exists
        run: |
          test -f Dockerfile || (echo "Dockerfile отсутствует в корне репозитория" && exit 1)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile application
        run: python -m py_compile app.py engine.py report.py ui.py bench.py run_tests.py invariant_catalog.py

      - name: Run regression suite
        run: python run_tests.py

      - name: Run benchmark suite
        run: python bench.py
