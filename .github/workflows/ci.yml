name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Compile application
        run: python -m py_compile integration_architect_pro.py

      - name: Run backend/unit regression suite
        run: python -m pytest -q -m "not browser"

  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run browser UI regression suite
        run: python -m pytest -q tests/ui -m browser
