name: Clear repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove all files except .git
        run: |
          find . -mindepth 1 \
            ! -path './.git' \
            ! -path './.git/*' \
            -exec rm -rf {} +

      - name: Add placeholder README
        run: |
          echo "# Repository cleared" > README.md
          echo "" >> README.md
          echo "Repository was cleared via GitHub Actions workflow." >> README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Clear repository"
          git push
