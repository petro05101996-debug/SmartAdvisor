name: Unpack archive

on:
  workflow_dispatch:
    inputs:
      archive_name:
        description: "Archive name"
        required: true
        default: "SmartAdvisor-main-v5_9_brutal_human_tested.zip"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip archive
        run: |
          ARCHIVE="${{ github.event.inputs.archive_name }}"
          WORKDIR="_unzipped_project"

          echo "Archive: $ARCHIVE"
          echo "Files before:"
          ls -la

          rm -rf "$WORKDIR"
          mkdir "$WORKDIR"

          unzip -q "$ARCHIVE" -d "$WORKDIR"

          echo "Unzipped content:"
          ls -la "$WORKDIR"

          # If zip contains one root folder, move its content to repo root
          INNER_DIR=$(find "$WORKDIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          INNER_FILES=$(find "$WORKDIR" -mindepth 1 -maxdepth 1 -type f | wc -l)
          INNER_DIRS=$(find "$WORKDIR" -mindepth 1 -maxdepth 1 -type d | wc -l)

          if [ "$INNER_DIRS" = "1" ] && [ "$INNER_FILES" = "0" ]; then
            SOURCE_DIR="$INNER_DIR"
          else
            SOURCE_DIR="$WORKDIR"
          fi

          echo "Source dir: $SOURCE_DIR"

          # Remove everything except .git, .github, archive and temp folder
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name "$ARCHIVE" \
            ! -name "$WORKDIR" \
            -exec rm -rf {} \;

          cp -r "$SOURCE_DIR"/. .

          rm -rf "$WORKDIR"
          rm -f "$ARCHIVE"

          echo "Files after:"
          ls -la

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Unpack archive"
          git push
