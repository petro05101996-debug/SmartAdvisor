name: Unpack archive to repository root

on:
  workflow_dispatch:
    inputs:
      archive_name:
        description: "Zip archive name in repo root"
        required: true
        default: "SmartAdvisor-main-v5_9_brutal_human_tested.zip"
      branch:
        description: "Branch to commit result"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Unpack archive
        run: |
          set -e

          ARCHIVE="${{ github.event.inputs.archive_name }}"
          TMP_DIR="_unpack_tmp"

          if [ ! -f "$ARCHIVE" ]; then
            echo "Archive not found: $ARCHIVE"
            echo "Files in repo root:"
            ls -la
            exit 1
          fi

          rm -rf "$TMP_DIR"
          mkdir "$TMP_DIR"

          unzip -q "$ARCHIVE" -d "$TMP_DIR"

          echo "Archive content:"
          find "$TMP_DIR" -maxdepth 2 -print | head -100

          ROOT_DIR="$TMP_DIR"

          # If archive contains a single folder, use it as project root.
          TOP_DIRS=$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l)
          TOP_FILES=$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type f | wc -l)

          if [ "$TOP_DIRS" -eq 1 ] && [ "$TOP_FILES" -eq 0 ]; then
            ROOT_DIR=$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)
            echo "Using inner root folder: $ROOT_DIR"
          fi

          # Clean repo root except git, workflows, archive and temp dir.
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name "$ARCHIVE" \
            ! -name "$TMP_DIR" \
            -exec rm -rf {} +

          # Copy unpacked project to repo root.
          rsync -a "$ROOT_DIR"/ ./

          # Remove archive and temp dir.
          rm -rf "$TMP_DIR"
          rm -f "$ARCHIVE"

      - name: Check project is in root
        run: |
          echo "Files after unpack:"
          ls -la

          if [ ! -f "Dockerfile" ]; then
            echo "ERROR: Dockerfile not found in repo root"
            echo "Maybe archive was not unpacked correctly"
            find . -maxdepth 3 -name Dockerfile -print
            exit 1
          fi

          if [ ! -f "requirements.txt" ]; then
            echo "WARNING: requirements.txt not found"
          fi

          if [ ! -f "integration_architect_pro.py" ] && [ ! -f "app.py" ] && [ ! -f "main.py" ]; then
            echo "ERROR: app entrypoint not found"
            find . -maxdepth 3 -type f | head -100
            exit 1
          fi

      - name: Run basic checks
        run: |
          set -e

          python -m pip install --upgrade pip

          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

          python -m compileall .

          if [ -d "tests" ]; then
            pip install pytest
            pytest -q --ignore=tests/ui
          fi

      - name: Commit unpacked files
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Unpack project archive"
          git push origin HEAD:${{ github.event.inputs.branch }}
