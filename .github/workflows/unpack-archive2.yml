name: Unpack uploaded archive

on:
  workflow_dispatch:
    inputs:
      archive_name:
        description: "Archive name in repository root"
        required: true
        default: "SmartAdvisor-main-v5_9_brutal_human_tested.zip"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack archive
        run: |
          set -e

          ARCHIVE="${{ github.event.inputs.archive_name }}"
          TMP_DIR="_unpacked"

          if [ ! -f "$ARCHIVE" ]; then
            echo "Archive not found: $ARCHIVE"
            echo "Files in root:"
            ls -la
            exit 1
          fi

          rm -rf "$TMP_DIR"
          mkdir "$TMP_DIR"

          unzip -q "$ARCHIVE" -d "$TMP_DIR"

          ROOT_DIR="$TMP_DIR"

          # If archive contains one folder, use it as root
          if [ "$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l)" = "1" ] && \
             [ "$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type f | wc -l)" = "0" ]; then
            ROOT_DIR="$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          fi

          # Remove everything except git, github folder, archive and temp
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name "$ARCHIVE" \
            ! -name "$TMP_DIR" \
            -exec rm -rf {} +

          # Copy unpacked files to repo root
          cp -a "$ROOT_DIR"/. .

          # Remove archive and temp folder
          rm -rf "$TMP_DIR"
          rm -f "$ARCHIVE"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Unpack uploaded archive"
          git push
