name: Unpack SmartAdvisor v5.9 archive

on:
  workflow_dispatch:
    inputs:
      archive_name:
        description: "Archive file name in repository root"
        required: true
        default: "SmartAdvisor-main-v5_9_brutal_human_tested.zip"
      target_branch:
        description: "Branch to unpack archive into"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Show repository before unpack
        run: |
          echo "Branch:"
          git branch --show-current
          echo "Root files:"
          ls -la

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Validate archive
        run: |
          ARCHIVE="${{ github.event.inputs.archive_name }}"

          if [ ! -f "$ARCHIVE" ]; then
            echo "ERROR: archive not found in repository root: $ARCHIVE"
            echo "Files in repository root:"
            ls -la
            exit 1
          fi

          unzip -t "$ARCHIVE"

      - name: Unpack archive into repository root
        run: |
          set -euo pipefail

          ARCHIVE="${{ github.event.inputs.archive_name }}"
          TMP_DIR="_smartadvisor_unpacked_tmp"

          rm -rf "$TMP_DIR"
          mkdir "$TMP_DIR"

          unzip -q "$ARCHIVE" -d "$TMP_DIR"

          echo "Unpacked top-level content:"
          find "$TMP_DIR" -maxdepth 2 -type f | head -80

          ROOT_DIR="$TMP_DIR"
          DIR_COUNT=$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l)
          FILE_COUNT=$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type f | wc -l)

          if [ "$DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            ROOT_DIR=$(find "$TMP_DIR" -mindepth 1 -maxdepth 1 -type d | head -1)
            echo "Detected single root folder inside archive: $ROOT_DIR"
          else
            echo "Archive files are directly in zip root."
          fi

          echo "Cleaning repository root, keeping .git and .github..."
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name "$ARCHIVE" \
            ! -name "$TMP_DIR" \
            -exec rm -rf {} +

          echo "Copying project files into repository root..."
          rsync -a "$ROOT_DIR"/ ./

          echo "Removing temporary files and archive..."
          rm -rf "$TMP_DIR"
          rm -f "$ARCHIVE"

      - name: Verify deploy structure
        run: |
          echo "Repository after unpack:"
          ls -la

          echo "Important files:"
          find . -maxdepth 2 \( \
            -name "Dockerfile" -o \
            -name "requirements.txt" -o \
            -name "pyproject.toml" -o \
            -name "package.json" -o \
            -name "app.py" -o \
            -name "main.py" -o \
            -name "integration_architect_pro.py" \
          \) -print

          if [ ! -f "Dockerfile" ]; then
            echo "ERROR: Dockerfile not found in repository root."
            echo "Timeweb/App Platform usually expects Dockerfile in root."
            exit 1
          fi

          if [ ! -f "requirements.txt" ]; then
            echo "WARNING: requirements.txt not found."
          fi

          if [ ! -f "integration_architect_pro.py" ] && [ ! -f "app.py" ] && [ ! -f "main.py" ]; then
            echo "ERROR: no obvious Python app entrypoint found."
            exit 1
          fi

      - name: Run Python checks
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip

          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

          echo "Running Python compile check..."
          python -m compileall .

          if [ -d "tests" ]; then
            echo "Running pytest..."
            pip install pytest
            pytest -q --ignore=tests/ui
          else
            echo "No tests directory found, skipping pytest."
          fi

      - name: Run optional JS checks
        run: |
          set -euo pipefail

          if [ -f "package.json" ]; then
            npm install
            npm run build --if-present
            npm test --if-present
          else
            echo "No package.json found, skipping JS checks."
          fi

      - name: Commit unpacked project
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Git status:"
          git status --short

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "Unpack SmartAdvisor v5.9 and prepare for deployment"
          git push origin HEAD:${{ github.event.inputs.target_branch }}
