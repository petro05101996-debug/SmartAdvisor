name: Unzip archive into repository

on:
  workflow_dispatch:
    inputs:
      archive_name:
        description: "ZIP archive name in repository root"
        required: true
        default: "archive.zip"
      target_dir:
        description: "Where to unpack. Use . for repository root"
        required: true
        default: "."
      remove_archive:
        description: "Remove ZIP after unpack"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Check archive exists
        run: |
          if [ ! -f "${{ inputs.archive_name }}" ]; then
            echo "Archive not found: ${{ inputs.archive_name }}"
            echo "Files in repository root:"
            ls -la
            exit 1
          fi

      - name: Unzip archive
        run: |
          mkdir -p "${{ inputs.target_dir }}"
          unzip -o "${{ inputs.archive_name }}" -d "${{ inputs.target_dir }}"

      - name: Remove archive
        if: ${{ inputs.remove_archive == 'true' }}
        run: |
          rm -f "${{ inputs.archive_name }}"

      - name: Show result
        run: |
          echo "Repository files after unzip:"
          find . -maxdepth 3 -type f | sort | head -200

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          git commit -m "Unzip archive into repository" || echo "Nothing to commit"
          git push
