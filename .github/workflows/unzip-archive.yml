name: Unzip archive into repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Find ZIP archive
        id: find_zip
        run: |
          echo "Files in repository root:"
          ls -la

          ZIP_COUNT=$(find . -maxdepth 1 -type f -name "*.zip" | wc -l | tr -d ' ')

          if [ "$ZIP_COUNT" = "0" ]; then
            echo "No ZIP archive found in repository root."
            echo "Upload exactly one ZIP archive to repository root and run workflow again."
            exit 1
          fi

          if [ "$ZIP_COUNT" != "1" ]; then
            echo "More than one ZIP archive found. Leave only one ZIP in repository root."
            find . -maxdepth 1 -type f -name "*.zip" -print
            exit 1
          fi

          ZIP_FILE=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)
          ZIP_FILE=${ZIP_FILE#./}

          echo "Found archive: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Unzip archive to temporary directory
        run: |
          ZIP_FILE="${{ steps.find_zip.outputs.zip_file }}"

          rm -rf _unzipped
          mkdir -p _unzipped

          unzip -o "$ZIP_FILE" -d _unzipped

          echo "Unzipped content:"
          find _unzipped -maxdepth 3 -type f | sort | head -300

      - name: Clean repository files except .git and .github
        run: |
          echo "Cleaning repository root, preserving .git and .github..."
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            ! -name "_unzipped" \
            -exec rm -rf {} +

      - name: Move files to repository root
        run: |
          shopt -s dotglob nullglob

          TOP_LEVEL_COUNT=$(find _unzipped -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')

          if [ "$TOP_LEVEL_COUNT" = "1" ] && [ -d "$(find _unzipped -mindepth 1 -maxdepth 1 | head -n 1)" ]; then
            ROOT_DIR="$(find _unzipped -mindepth 1 -maxdepth 1 | head -n 1)"
            echo "Archive has single root folder: $ROOT_DIR"
            cp -a "$ROOT_DIR"/. .
          else
            echo "Archive content is directly inside ZIP"
            cp -a _unzipped/. .
          fi

      - name: Cleanup temporary files
        run: |
          rm -rf _unzipped
          rm -f .gitkeep
          rm -f ./*.zip

      - name: Verify deploy files
        run: |
          echo "Final repository files:"
          find . -maxdepth 3 \
            -not -path "./.git/*" \
            -not -path "./.github/workflows/*" \
            | sort | head -300

          echo ""
          echo "Checking deploy entry files..."

          if [ -f "Dockerfile" ]; then
            echo "OK: Dockerfile found"
          else
            echo "WARNING: Dockerfile not found"
          fi

          if [ -f "requirements.txt" ]; then
            echo "OK: requirements.txt found"
          else
            echo "WARNING: requirements.txt not found"
          fi

          if [ -f "integration_architect_pro.py" ]; then
            echo "OK: integration_architect_pro.py found"
          else
            echo "WARNING: integration_architect_pro.py not found"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Unzip archive into repository"
          git push
