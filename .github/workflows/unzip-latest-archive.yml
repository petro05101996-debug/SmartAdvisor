name: Unzip latest SmartAdvisor archive into repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Check ZIP archive exists
        run: |
          echo "Files in repository root:"
          ls -la

          ZIP_FILE="SmartAdvisor-main-no-text-visual-db-verified.zip"

          if [ ! -f "$ZIP_FILE" ]; then
            echo "Archive not found: $ZIP_FILE"
            echo "Upload this ZIP archive to repository root and run workflow again."
            exit 1
          fi

          echo "Found archive: $ZIP_FILE"

      - name: Unzip archive to temporary directory
        run: |
          ZIP_FILE="SmartAdvisor-main-no-text-visual-db-verified.zip"

          rm -rf _unzipped
          mkdir -p _unzipped

          unzip -o "$ZIP_FILE" -d _unzipped

          echo "Unzipped content:"
          find _unzipped -maxdepth 3 -type f | sort | head -200

      - name: Move files to repository root
        run: |
          shopt -s dotglob nullglob

          TOP_LEVEL_COUNT=$(find _unzipped -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')

          if [ "$TOP_LEVEL_COUNT" = "1" ] && [ -d "$(find _unzipped -mindepth 1 -maxdepth 1 | head -n 1)" ]; then
            ROOT_DIR="$(find _unzipped -mindepth 1 -maxdepth 1 | head -n 1)"
            echo "Archive has single root folder: $ROOT_DIR"
            cp -a "$ROOT_DIR"/. .
          else
            echo "Archive content is directly inside ZIP"
            cp -a _unzipped/. .
          fi

      - name: Cleanup ZIP and temporary files
        run: |
          ZIP_FILE="SmartAdvisor-main-no-text-visual-db-verified.zip"

          rm -rf _unzipped
          rm -f "$ZIP_FILE"
          rm -f .gitkeep

      - name: Show final repository files
        run: |
          echo "Final repository files:"
          find . -maxdepth 3 \
            -not -path "./.git/*" \
            -not -path "./.github/workflows/*" \
            | sort | head -300

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Unzip latest SmartAdvisor archive into repository"
          git push
