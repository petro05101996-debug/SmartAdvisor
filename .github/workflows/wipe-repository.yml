name: Wipe repository completely

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE_ALL to confirm'
        required: true
        default: ''
      branch:
        description: 'Branch to wipe'
        required: true
        default: 'main'
      rewrite_history:
        description: 'Rewrite branch history with one empty commit'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  wipe:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DELETE_ALL" ]; then
            echo "Confirmation failed. Type DELETE_ALL to run this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Show current files before wipe
        run: |
          echo "Current branch:"
          git branch --show-current || true

          echo "Current files:"
          find . -maxdepth 3 -type f \
            ! -path "./.git/*" \
            | sort \
            | head -200 || true

          echo "Repository size:"
          du -sh . || true

      - name: Wipe files but keep history
        if: ${{ inputs.rewrite_history == 'false' }}
        run: |
          echo "Deleting all tracked files from branch, keeping git history..."

          git ls-files -z | xargs -0 -r git rm -f --ignore-unmatch

          git commit --allow-empty -m "Wipe repository files"
          git push origin HEAD:${{ inputs.branch }}

      - name: Wipe files and rewrite history
        if: ${{ inputs.rewrite_history == 'true' }}
        run: |
          echo "Rewriting branch history with one empty commit..."

          TEMP_BRANCH="empty-${{ github.run_id }}"

          git checkout --orphan "$TEMP_BRANCH"

          python3 - <<'PY'
          import os
          import shutil

          root = "."
          for name in os.listdir(root):
              if name == ".git":
                  continue

              path = os.path.join(root, name)

              if os.path.isdir(path):
                  shutil.rmtree(path)
              else:
                  os.remove(path)
          PY

          git add -A
          git commit --allow-empty -m "Reset repository to empty state"

          git push --force origin HEAD:${{ inputs.branch }}

      - name: Done
        run: |
          echo "Repository wipe completed."
          echo "Branch wiped: ${{ inputs.branch }}"
          echo "Rewrite history: ${{ inputs.rewrite_history }}"
